<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What NOT to Learn Engine</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      AI-Powered · Real-Time Trends
    </div>
    <h1>What <span>NOT</span> to Learn</h1>
    <p class="subtitle">
      Enter your career goal and get data-driven advice on which skills to skip —
      and what to learn instead.
    </p>
  </header>

  <div class="search-wrapper">
    <div class="search-box">
      <span class="search-icon">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </span>
      <input
        id="queryInput"
        type="text"
        placeholder="e.g. AI engineer, web development, data science…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="analyzeBtn">What Should I Avoid? →</button>
    </div>

    <div class="examples">
      <span>Try:</span>
      <button class="example-chip" data-value="web development">Web Development</button>
      <button class="example-chip" data-value="AI / machine learning engineer">AI Engineer</button>
      <button class="example-chip" data-value="data science">Data Science</button>
      <button class="example-chip" data-value="DevOps / cloud infrastructure">DevOps</button>
      <button class="example-chip" data-value="mobile app development">Mobile Dev</button>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-text" id="loadingText">Analyzing trends...</p>
  </div>

  <!-- Error State -->
  <div id="error"></div>

  <!-- Results -->
  <div id="results">

    <div class="summary-card" id="summaryCard">
      <span id="summaryText"></span>
    </div>

    <div class="results-grid">

      <!-- Avoid Section -->
      <div class="section section-avoid">
        <div class="section-header">
          <span class="section-icon">🚫</span>
          Skills to Avoid
        </div>
        <div class="skill-list" id="avoidList"></div>
      </div>

      <!-- Learn Instead Section -->
      <div class="section section-learn">
        <div class="section-header">
          <span class="section-icon">🚀</span>
          Learn Instead
        </div>
        <div class="skill-list" id="learnList"></div>
      </div>

    </div>
  </div>

  <footer>
    Powered by <a href="https://brightdata.com" target="_blank">Bright Data</a>
    &amp; <a href="https://featherless.ai" target="_blank">Featherless AI</a>
    · Real-time skill demand analysis
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
